<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>tap.connect — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080810;
      color: #f0ede8;
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono&display=swap');
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 48px;
    }
    .logo span { color: #e8c547; }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    p {
      color: rgba(240,237,232,0.45);
      font-size: 14px;
      line-height: 1.7;
      max-width: 280px;
      margin: 0 auto 32px;
    }
    .tip {
      background: rgba(232,197,71,0.08);
      border: 1px solid rgba(232,197,71,0.2);
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 13px;
      color: rgba(240,237,232,0.6);
      line-height: 1.65;
      max-width: 320px;
      margin-bottom: 32px;
    }
    .tip strong { color: #e8c547; }
    button {
      background: #e8c547;
      color: #000;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      padding: 13px 32px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">tap<span>.</span>connect</div>
  <div class="icon">📶</div>
  <h1>You're offline</h1>
  <p>No internet connection right now. Your saved connections are still available.</p>

  <div class="tip">
    <strong>At the event?</strong> You still need a connection to tap with people — but your profile and past connections are cached and ready.
  </div>

  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
