<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#080810" />
    <title>tap.connect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #080810;
        color: #f0ede8;
        font-family: 'DM Mono', monospace;
        -webkit-font-smoothing: antialiased;
        overscroll-behavior: none;
      }
      :root {
        --bg: #080810;
        --bg2: #10101e;
        --bg3: #18182a;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.14);
        --text: #f0ede8;
        --text2: rgba(240,237,232,0.55);
        --text3: rgba(240,237,232,0.3);
        --accent: #e8c547;
        --accent2: #f0a050;
        --green: #4ecb8d;
        --red: #f06060;
        --radius: 16px;
        --radius-sm: 10px;
        --radius-lg: 24px;
        --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
      }
      input, button, textarea, select { font-family: inherit; }
      button { cursor: pointer; border: none; background: none; }
      a { color: inherit; text-decoration: none; }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; } to { opacity: 1; }
      }
      @keyframes pulse-ring {
        0%   { transform: scale(0.9); opacity: 0.8; }
        100% { transform: scale(1.8); opacity: 0; }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      @keyframes sparkle {
        0%   { transform: scale(0) rotate(0deg);   opacity: 1; }
        60%  { transform: scale(1.3) rotate(200deg); opacity: 1; }
        100% { transform: scale(0) rotate(400deg); opacity: 0; }
      }
      @keyframes shimmer {
        0%   { background-position: -200% 0; }
        100% { background-position:  200% 0; }
      }
      .fade-up { animation: fadeUp 0.4s ease both; }
      .fade-in { animation: fadeIn 0.3s ease both; }
    </style>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="tap.connect" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
